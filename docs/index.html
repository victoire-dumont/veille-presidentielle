<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veille Presidentielle 2027</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #FAF9F5;
      --ink: #1A1A1A;
      --ink-light: #4A4A4A;
      --ink-muted: #8A8A8A;
      --rule: #D4D0C8;
      --rule-dark: #1A1A1A;
      --bleu: #002654;
      --rouge: #CE1126;
      --accent: #B8860B;
      --bg-card: #FFFFFF;
      --bg-filter: #F0EFE9;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.10);
      --radius: 2px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Textures ─────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='%23000' opacity='0.015'/%3E%3C/svg%3E") repeat;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      border-bottom: 3px double var(--rule-dark);
      padding: 2rem 0 1.5rem;
      text-align: center;
      position: relative;
    }
    header::before {
      content: '';
      display: block;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--bleu) 33%, var(--cream) 33%, var(--cream) 66%, var(--rouge) 66%);
      margin-bottom: 1.5rem;
    }

    .header-date {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .header-subtitle {
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-top: 0.5rem;
      font-style: italic;
      font-weight: 300;
    }

    /* ── Container ────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── Stats bar ────────────────────────────────── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 1.5rem;
    }

    .stat {
      text-align: center;
    }
    .stat-value {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      color: var(--ink);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 0.2rem;
    }

    /* ── Filters ──────────────────────────────────── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1rem 0;
      margin-bottom: 1rem;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .filter-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    select, .search-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 0.4rem 0.7rem;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus, .search-input:focus {
      outline: none;
      border-color: var(--ink-muted);
    }
    .search-input {
      width: 200px;
    }
    .search-input::placeholder {
      color: var(--ink-muted);
      font-style: italic;
    }

    .filter-right {
      margin-left: auto;
    }

    /* ── Article list ─────────────────────────────── */
    .articles-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--rule-dark);
      margin-bottom: 0;
    }
    .articles-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.3rem;
      font-weight: 400;
    }
    .articles-count {
      font-size: 0.75rem;
      color: var(--ink-muted);
    }

    .article-list {
      list-style: none;
    }

    .article-item {
      display: grid;
      grid-template-columns: 7.5rem 1fr;
      gap: 1.2rem;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--rule);
      transition: background 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .article-item:hover {
      background: rgba(0,0,0,0.015);
    }

    .article-meta {
      padding-top: 0.15rem;
    }
    .article-date {
      font-size: 0.78rem;
      color: var(--ink-muted);
      line-height: 1.4;
    }
    .article-source {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 0.3rem;
    }

    .article-body {}
    .article-candidat {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bleu);
      margin-bottom: 0.3rem;
      padding: 0.15rem 0.45rem;
      background: rgba(0, 38, 84, 0.06);
      border-radius: var(--radius);
    }
    .article-titre {
      font-family: 'Instrument Serif', serif;
      font-size: 1.15rem;
      line-height: 1.35;
      font-weight: 400;
      margin-bottom: 0.3rem;
    }
    .article-item:hover .article-titre {
      color: var(--bleu);
    }
    .article-extrait {
      font-size: 0.82rem;
      color: var(--ink-light);
      line-height: 1.55;
      font-weight: 300;
    }

    .article-statut {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.1rem 0.4rem;
      border-radius: var(--radius);
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .statut-a_valider { background: #FFF3CD; color: #856404; }
    .statut-valide { background: #D4EDDA; color: #155724; }
    .statut-rejete { background: #F8D7DA; color: #721C24; }

    /* ── Empty state ──────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--ink-muted);
    }
    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }
    .empty-state p {
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ── Loading ──────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
    }
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--rule);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p {
      font-size: 0.82rem;
      color: var(--ink-muted);
      font-style: italic;
    }

    /* ── Error ────────────────────────────────────── */
    .error-banner {
      background: #FFF3CD;
      border: 1px solid #FFEAA7;
      padding: 1rem 1.5rem;
      margin: 1rem 0;
      border-radius: var(--radius);
      font-size: 0.85rem;
      color: #856404;
    }
    .error-banner code {
      font-size: 0.78rem;
      background: rgba(0,0,0,0.05);
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
    }

    /* ── Footer ───────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 0 3rem;
      margin-top: 2rem;
      border-top: 1px solid var(--rule);
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 680px) {
      .stats-bar { gap: 1.5rem; }
      .article-item {
        grid-template-columns: 1fr;
        gap: 0.3rem;
      }
      .article-meta {
        display: flex;
        gap: 0.8rem;
        align-items: baseline;
      }
      .article-source { margin-top: 0; }
      .filters { flex-direction: column; align-items: stretch; }
      .filter-right { margin-left: 0; }
      .search-input { width: 100%; }
    }

    /* ── Animations ───────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .article-item {
      animation: fadeUp 0.3s ease both;
    }
  </style>
</head>
<body>

  <!-- ═══════════════ HEADER ═══════════════ -->
  <div class="container">
    <header>
      <div class="header-date" id="current-date"></div>
      <h1>Veille Presidentielle</h1>
      <div class="header-subtitle">Prises de parole des candidats dans les medias</div>
    </header>

    <!-- ═══════════════ STATS ═══════════════ -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat">
        <div class="stat-value" id="stat-total">--</div>
        <div class="stat-label">Articles</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-candidats">--</div>
        <div class="stat-label">Candidats</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-sources">--</div>
        <div class="stat-label">Sources</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-today">--</div>
        <div class="stat-label">Aujourd'hui</div>
      </div>
    </div>

    <!-- ═══════════════ FILTERS ═══════════════ -->
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Candidat</span>
        <select id="filter-candidat">
          <option value="">Tous</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Source</span>
        <select id="filter-source">
          <option value="">Toutes</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Statut</span>
        <select id="filter-statut">
          <option value="">Tous</option>
          <option value="a_valider">A valider</option>
          <option value="valide">Valide</option>
          <option value="rejete">Rejete</option>
        </select>
      </div>
      <div class="filter-group filter-right">
        <input type="text" class="search-input" id="search-input" placeholder="Rechercher un titre...">
      </div>
    </div>

    <!-- ═══════════════ ARTICLES ═══════════════ -->
    <div class="articles-header">
      <div class="articles-title">Dernieres prises de parole</div>
      <div class="articles-count" id="articles-count"></div>
    </div>

    <div id="articles-container">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Chargement des articles...</p>
      </div>
    </div>

    <!-- ═══════════════ FOOTER ═══════════════ -->
    <footer>
      Veille Presidentielle 2027 &middot; Collecte automatique via RSS &middot; 
    </footer>
  </div>

  <!-- ═══════════════ SCRIPT ═══════════════ -->
  <script>
    // ── Configuration ────────────────────────────
    // Remplace SUPABASE_ANON_KEY par ta cle anon (Dashboard > Settings > API)
    const SUPABASE_URL = 'https://fwhvkiijogsgvgehlena.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YnJssNbAki6AcIqoPDRSmg_Eb6AvLgB';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── State ────────────────────────────────────
    let allArticles = [];
    let candidatsMap = {};

    // ── Init ─────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      setCurrentDate();
      await loadData();
      setupFilters();
    });

    function setCurrentDate() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('current-date').textContent =
        now.toLocaleDateString('fr-FR', options).toUpperCase();
    }

    // ── Data loading ─────────────────────────────
    async function loadData() {
      try {
        // Charger candidats et articles en parallele
        const [candidatsRes, articlesRes] = await Promise.all([
          db.from('candidats').select('*').eq('actif', true),
          db.from('prises_de_parole').select('*').order('date_publication', { ascending: false })
        ]);

        if (candidatsRes.error) throw candidatsRes.error;
        if (articlesRes.error) throw articlesRes.error;

        // Indexer les candidats par id
        const candidats = candidatsRes.data || [];
        candidats.forEach(c => { candidatsMap[c.id] = c; });

        allArticles = articlesRes.data || [];

        // Peupler les filtres
        populateFilters(candidats, allArticles);

        // Stats
        updateStats(allArticles, candidats);

        // Afficher
        renderArticles(allArticles);

      } catch (err) {
        console.error('Erreur chargement:', err);
        document.getElementById('articles-container').innerHTML = `
          <div class="error-banner">
            <strong>Erreur de connexion a Supabase.</strong><br>
            Verifie que la cle <code>SUPABASE_ANON_KEY</code> est configuree dans
            <code>docs/index.html</code> et que les politiques RLS autorisent la lecture.
          </div>
        `;
      }
    }

    // ── Filters ──────────────────────────────────
    function populateFilters(candidats, articles) {
      const candidatSelect = document.getElementById('filter-candidat');
      candidats
        .sort((a, b) => a.nom.localeCompare(b.nom))
        .forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.nom;
          candidatSelect.appendChild(opt);
        });

      const sources = [...new Set(articles.map(a => a.source).filter(Boolean))].sort();
      const sourceSelect = document.getElementById('filter-source');
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        sourceSelect.appendChild(opt);
      });
    }

    function setupFilters() {
      const ids = ['filter-candidat', 'filter-source', 'filter-statut', 'search-input'];
      ids.forEach(id => {
        document.getElementById(id).addEventListener(
          id === 'search-input' ? 'input' : 'change',
          applyFilters
        );
      });
    }

    function applyFilters() {
      const candidatId = document.getElementById('filter-candidat').value;
      const source = document.getElementById('filter-source').value;
      const statut = document.getElementById('filter-statut').value;
      const search = document.getElementById('search-input').value.toLowerCase().trim();

      let filtered = allArticles;

      if (candidatId) filtered = filtered.filter(a => String(a.candidat_id) === candidatId);
      if (source) filtered = filtered.filter(a => a.source === source);
      if (statut) filtered = filtered.filter(a => a.statut === statut);
      if (search) filtered = filtered.filter(a =>
        (a.titre || '').toLowerCase().includes(search) ||
        (a.extrait || '').toLowerCase().includes(search)
      );

      renderArticles(filtered);
    }

    // ── Stats ────────────────────────────────────
    function updateStats(articles, candidats) {
      document.getElementById('stat-total').textContent = articles.length;
      document.getElementById('stat-candidats').textContent = candidats.length;

      const sources = new Set(articles.map(a => a.source).filter(Boolean));
      document.getElementById('stat-sources').textContent = sources.size;

      const today = new Date().toISOString().split('T')[0];
      const todayCount = articles.filter(a =>
        a.date_publication && a.date_publication.startsWith(today)
      ).length;
      document.getElementById('stat-today').textContent = todayCount;
    }

    // ── Render ───────────────────────────────────
    function renderArticles(articles) {
      const container = document.getElementById('articles-container');
      const countEl = document.getElementById('articles-count');

      countEl.textContent = `${articles.length} article${articles.length !== 1 ? 's' : ''}`;

      if (articles.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">&mdash;</div>
            <p>Aucun article ne correspond aux filtres selectionnes.</p>
          </div>
        `;
        return;
      }

      const list = document.createElement('ul');
      list.className = 'article-list';

      articles.forEach((article, i) => {
        const candidat = candidatsMap[article.candidat_id];
        const li = document.createElement('li');

        const link = document.createElement('a');
        link.className = 'article-item';
        link.href = article.url || '#';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;

        const date = formatDate(article.date_publication);
        const statutClass = article.statut ? `statut-${article.statut}` : '';
        const statutLabel = formatStatut(article.statut);

        link.innerHTML = `
          <div class="article-meta">
            <div class="article-date">${date}</div>
            <div class="article-source">${escapeHtml(article.source || 'Source inconnue')}</div>
          </div>
          <div class="article-body">
            <span class="article-candidat">${escapeHtml(candidat ? candidat.nom : 'Inconnu')}</span>
            <span class="article-statut ${statutClass}">${statutLabel}</span>
            <div class="article-titre">${escapeHtml(article.titre || 'Sans titre')}</div>
            <div class="article-extrait">${escapeHtml(article.extrait || '')}</div>
          </div>
        `;

        li.appendChild(link);
        list.appendChild(li);
      });

      container.innerHTML = '';
      container.appendChild(list);
    }

    // ── Helpers ──────────────────────────────────
    function formatDate(isoString) {
      if (!isoString) return 'Date inconnue';
      const d = new Date(isoString);
      const day = d.getDate();
      const months = ['janv.', 'fevr.', 'mars', 'avril', 'mai', 'juin',
                       'juil.', 'aout', 'sept.', 'oct.', 'nov.', 'dec.'];
      const month = months[d.getMonth()];
      const year = d.getFullYear();
      const hours = String(d.getHours()).padStart(2, '0');
      const mins = String(d.getMinutes()).padStart(2, '0');
      return `${day} ${month} ${year}<br>${hours}:${mins}`;
    }

    function formatStatut(statut) {
      const labels = { a_valider: 'A valider', valide: 'Valide', rejete: 'Rejete' };
      return labels[statut] || statut || '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>

</body>
</html>
